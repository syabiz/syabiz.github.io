<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>996-Coin Web Wallet (Fixed)</title>
    <script src="https://cdn.jsdelivr.net/npm/bip39@3.0.4/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bitcoinjs-lib@5.2.0/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bs58check@2.1.2/index.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: system-ui; }
        body { background: #1e1f2c; color: #eee; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 800px; width: 100%; background: #0f1222; border-radius: 24px; padding: 24px; }
        button, .btn { background: #2a3f6e; border: none; color: white; padding: 8px 16px; border-radius: 40px; cursor: pointer; margin: 4px; }
        button.danger { background: #8b3c3c; }
        input, textarea { width: 100%; padding: 10px; margin: 8px 0; background: #0b0e1a; border: 1px solid #2e3a5c; color: white; border-radius: 20px; }
        .address-box { background: #0a0c16; padding: 12px; border-radius: 20px; word-break: break-all; margin: 12px 0; }
        .balance { font-size: 2rem; color: #6fcf97; }
        .error { color: #ff8888; background: #3a1a1a; padding: 8px; border-radius: 16px; margin-top: 8px; }
        .success { color: #88ff88; }
        hr { border-color: #2e3a5c; }
    </style>
</head>
<body>
<div class="container">
    <h2>⛏️ 996-Coin Web Wallet (Fixed)</h2>
    <div class="card">
        <button id="generateBtn">✨ Generate Wallet</button>
        <button id="importMnemonicBtn">🔑 Import Mnemonic</button>
        <button id="importPrivateBtn">🔐 Import WIF</button>
        <button id="lockBtn" class="danger">Lock</button>
        <div id="importArea" style="display:none; margin-top:12px;">
            <textarea id="importInput" rows="2" placeholder="Mnemonic atau WIF..."></textarea>
            <button id="confirmImport">Import</button>
        </div>
        <div id="walletInfo" class="address-box">Belum ada wallet</div>
    </div>
    <div class="card">
        <h3>💰 Saldo</h3>
        <div id="addressDisplay"></div>
        <div><span class="balance" id="balanceValue">0</span> satoshi</div>
        <button id="refreshBtn">Refresh Saldo</button>
        <button id="utxoBtn">Lihat UTXO</button>
        <div id="utxoList" style="font-size:0.8rem; max-height:150px; overflow:auto;"></div>
    </div>
    <div class="card">
        <h3>✉️ Kirim</h3>
        <input type="text" id="toAddress" placeholder="Alamat tujuan (N...)" autocomplete="off">
        <input type="number" id="sendAmount" placeholder="Jumlah (satoshi)">
        <button id="sendBtn">Kirim</button>
        <button id="sendMaxBtn">Kirim Maksimal</button>
        <div id="txResult"></div>
    </div>
    <div class="error" id="globalError" style="display:none;"></div>
</div>
<script>
    // ==================== KONFIGURASI ====================
    const NETWORK = {
        messagePrefix: '\x18NNS Signed Message:\n',
        bech32: 'nn',
        bip32: { public: 0x0488b21e, private: 0x0488ade4 },
        pubKeyHash: 0x53,
        scriptHash: 0x7a,
        wif: 0x80
    };
    const API_BASE = 'https://explorer.996coin.com/api';
    const FEE_SAT = 10000; // 10k sat fee

    let currentWallet = null; // { address, wif, keyPair, mnemonic? }

    // Helper fetch dengan error handling
    async function apiGet(endpoint) {
        const url = `${API_BASE}${endpoint}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}: ${url}`);
        const text = await res.text();
        try {
            return JSON.parse(text);
        } catch(e) {
            throw new Error(`Invalid JSON from ${url}: ${text.substring(0,100)}`);
        }
    }

    async function getBalance(addr) {
        const data = await apiGet(`/getbalance/${addr}`);
        if (typeof data === 'object' && data.balance !== undefined) return Number(data.balance);
        if (typeof data === 'number') return data;
        return 0;
    }

    async function getUtxos(addr) {
        const data = await apiGet(`/utxos/${addr}`);
        if (Array.isArray(data)) return data;
        return [];
    }

    async function broadcastTx(rawHex) {
        const url = `${API_BASE}/sendrawtransaction/${rawHex}`;
        const res = await fetch(url, { method: 'POST' });
        const text = await res.text();
        try {
            return JSON.parse(text);
        } catch(e) {
            return { error: text };
        }
    }

    // ==================== Wallet Functions ====================
    async function generateFromMnemonic(mnemonic = null) {
        if (!mnemonic) mnemonic = bip39.generateMnemonic(128);
        if (!bip39.validateMnemonic(mnemonic)) throw new Error('Mnemonic invalid');
        const seed = await bip39.mnemonicToSeed(mnemonic);
        const root = bitcoin.bip32.fromSeed(seed, NETWORK);
        // path m/44'/0'/0'/0/0 (Bitcoin standard)
        const child = root.derivePath("m/44'/0'/0'/0/0");
        const keyPair = child.keyPair;
        const { address } = bitcoin.payments.p2pkh({ pubkey: keyPair.publicKey, network: NETWORK });
        const wif = keyPair.toWIF();
        return { address, wif, keyPair, mnemonic };
    }

    function importFromWIF(wif) {
        const keyPair = bitcoin.ECPair.fromWIF(wif, NETWORK);
        const { address } = bitcoin.payments.p2pkh({ pubkey: keyPair.publicKey, network: NETWORK });
        return { address, wif, keyPair, mnemonic: null };
    }

    // ==================== Build & Sign Transaction ====================
    async function buildAndSignTx(toAddress, amountSatoshi, useMax = false) {
        if (!currentWallet) throw new Error('Wallet not loaded');
        const utxos = await getUtxos(currentWallet.address);
        if (!utxos.length) throw new Error('No UTXOs available');
        
        let totalInput = 0;
        let selectedUtxos = [];
        for (const utxo of utxos) {
            totalInput += utxo.amount;
            selectedUtxos.push(utxo);
            if (totalInput >= amountSatoshi + FEE_SAT) break;
        }
        if (useMax) {
            if (totalInput <= FEE_SAT) throw new Error('Insufficient funds for fee');
            amountSatoshi = totalInput - FEE_SAT;
        }
        if (totalInput < amountSatoshi + FEE_SAT) {
            throw new Error(`Insufficient balance: need ${amountSatoshi+FEE_SAT}, have ${totalInput}`);
        }
        
        const psbt = new bitcoin.Psbt({ network: NETWORK });
        // Add inputs
        for (const u of selectedUtxos) {
            // Kita butuh scriptPubKey sebagai Buffer. API mengembalikan scriptPubKey dalam hex?
            if (!u.scriptPubKey) throw new Error(`UTXO missing scriptPubKey: ${JSON.stringify(u)}`);
            const scriptBuf = Buffer.from(u.scriptPubKey, 'hex');
            psbt.addInput({
                hash: u.txid,
                index: u.vout,
                witnessUtxo: {
                    script: scriptBuf,
                    value: u.amount
                },
                // nonWitnessUtxo tidak tersedia, gunakan witnessUtxo untuk p2pkh (didukung)
            });
        }
        // Output to recipient
        psbt.addOutput({ address: toAddress, value: amountSatoshi });
        // Change output
        const change = totalInput - amountSatoshi - FEE_SAT;
        if (change > 0) {
            psbt.addOutput({ address: currentWallet.address, value: change });
        }
        // Sign all inputs
        for (let i = 0; i < selectedUtxos.length; i++) {
            psbt.signInput(i, currentWallet.keyPair);
            psbt.validateSignaturesOfInput(i);
            psbt.finalizeInput(i);
        }
        const tx = psbt.extractTransaction();
        return tx.toHex();
    }

    // ==================== UI ====================
    function updateUI() {
        if (currentWallet && currentWallet.address) {
            document.getElementById('walletInfo').innerHTML = `✅ Address: ${currentWallet.address}<br>🔑 WIF: ${currentWallet.wif.substring(0,10)}...`;
            document.getElementById('addressDisplay').innerHTML = `Address: ${currentWallet.address}`;
            document.getElementById('refreshBtn').disabled = false;
            document.getElementById('utxoBtn').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('sendMaxBtn').disabled = false;
        } else {
            document.getElementById('walletInfo').innerHTML = '❌ No wallet';
            document.getElementById('addressDisplay').innerHTML = '';
            document.getElementById('balanceValue').innerText = '0';
            document.getElementById('refreshBtn').disabled = true;
            document.getElementById('utxoBtn').disabled = true;
            document.getElementById('sendBtn').disabled = true;
            document.getElementById('sendMaxBtn').disabled = true;
        }
    }

    async function refreshBalance() {
        if (!currentWallet) return;
        try {
            const bal = await getBalance(currentWallet.address);
            document.getElementById('balanceValue').innerText = bal.toLocaleString();
        } catch (err) {
            showError('Refresh balance: ' + err.message);
        }
    }

    async function showUtxos() {
        if (!currentWallet) return;
        try {
            const utxos = await getUtxos(currentWallet.address);
            const container = document.getElementById('utxoList');
            if (!utxos.length) { container.innerHTML = '<i>Tidak ada UTXO</i>'; return; }
            let html = '';
            for (const u of utxos) {
                html += `<div>📦 ${u.txid.substring(0,16)}... vout:${u.vout} amount:${u.amount} sat</div>`;
            }
            container.innerHTML = html;
        } catch (err) {
            showError('UTXO: ' + err.message);
        }
    }

    async function send(useMax = false) {
        const to = document.getElementById('toAddress').value.trim();
        if (!to || !to.startsWith('N')) { showError('Alamat tujuan harus dimulai dengan N'); return; }
        let amount = parseInt(document.getElementById('sendAmount').value);
        if (!useMax && (isNaN(amount) || amount <= 0)) { showError('Jumlah tidak valid'); return; }
        const resultDiv = document.getElementById('txResult');
        resultDiv.innerHTML = '⏳ Membangun transaksi...';
        try {
            const rawTx = await buildAndSignTx(to, amount, useMax);
            resultDiv.innerHTML = '📡 Broadcast...';
            const response = await broadcastTx(rawTx);
            if (response.error) throw new Error(response.error);
            resultDiv.innerHTML = `<span class="success">✅ Sukses! TXID: ${response.txid || response}</span>`;
            await refreshBalance();
            showUtxos();
            document.getElementById('sendAmount').value = '';
        } catch (err) {
            resultDiv.innerHTML = `<span class="error">❌ ${err.message}</span>`;
            console.error(err);
        }
    }

    function showError(msg) {
        const errDiv = document.getElementById('globalError');
        errDiv.innerText = msg;
        errDiv.style.display = 'block';
        setTimeout(() => errDiv.style.display = 'none', 5000);
    }

    // Event handlers
    document.getElementById('generateBtn').onclick = async () => {
        try {
            const wallet = await generateFromMnemonic();
            currentWallet = wallet;
            updateUI();
            await refreshBalance();
            alert(`Wallet baru dibuat!\nMnemonic: ${wallet.mnemonic}\nSimpan baik-baik.`);
        } catch(e) { showError(e.message); }
    };
    document.getElementById('importMnemonicBtn').onclick = () => {
        document.getElementById('importArea').style.display = 'block';
        document.getElementById('importInput').placeholder = '12 kata mnemonic...';
        document.getElementById('confirmImport').onclick = async () => {
            const mnemonic = document.getElementById('importInput').value.trim();
            try {
                const wallet = await generateFromMnemonic(mnemonic);
                currentWallet = wallet;
                updateUI();
                await refreshBalance();
                document.getElementById('importArea').style.display = 'none';
                alert('Import mnemonic sukses');
            } catch(e) { showError(e.message); }
        };
    };
    document.getElementById('importPrivateBtn').onclick = () => {
        document.getElementById('importArea').style.display = 'block';
        document.getElementById('importInput').placeholder = 'Private Key WIF...';
        document.getElementById('confirmImport').onclick = () => {
            const wif = document.getElementById('importInput').value.trim();
            try {
                const wallet = importFromWIF(wif);
                currentWallet = wallet;
                updateUI();
                refreshBalance();
                document.getElementById('importArea').style.display = 'none';
                alert('Import WIF sukses');
            } catch(e) { showError(e.message); }
        };
    };
    document.getElementById('lockBtn').onclick = () => {
        currentWallet = null;
        updateUI();
        document.getElementById('utxoList').innerHTML = '';
        document.getElementById('balanceValue').innerText = '0';
        document.getElementById('txResult').innerHTML = '';
    };
    document.getElementById('refreshBtn').onclick = refreshBalance;
    document.getElementById('utxoBtn').onclick = showUtxos;
    document.getElementById('sendBtn').onclick = () => send(false);
    document.getElementById('sendMaxBtn').onclick = () => send(true);

    updateUI();
</script>
</body>
</html>
